<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Camera Graph (3D)</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="viewport"></div>

  <aside id="hud">
    <header>
      <h1>Event Graph 3D</h1>
      <button id="collapse" title="Collapse panel">&#x2715;</button>
    </header>

    <section class="row">
      <label for="file-select">Event file</label>
      <div class="file-row">
        <select id="file-select"></select>
        <button id="refresh" title="Reload list">&#x21bb;</button>
      </div>
      <input type="file" id="file-upload" accept=".mat,.h5,.hdf5" />
      <label for="file-upload" class="file-button">Upload .mat / .h5</label>
    </section>

    <section class="row">
      <label>
        Max neighbours <span id="k-val" class="num">8</span>
        <input type="range" id="k" min="1" max="32" step="1" value="8" />
      </label>

      <label>
        Max distance <span id="d-val" class="num">12</span>
        <input type="range" id="d" min="1" max="200" step="1" value="12" />
      </label>

      <label>
        Time scale (z) <span id="ts-val" class="num">1.00</span>
        <input type="range" id="ts" min="0.05" max="5" step="0.05" value="1" />
      </label>

      <label>
        Speed &times; <span id="sp-val" class="num">1.0</span>
        <input type="range" id="sp" min="0.05" max="20" step="0.05" value="1" />
      </label>
    </section>

    <section class="row buttons">
      <button id="run" class="primary">Run</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset">Reset</button>
      <button id="fullscreen" title="Toggle fullscreen">&#x26F6;</button>
    </section>

    <section class="row stats">
      <div><span class="lbl">Events</span><span id="stat-events">0 / 0</span></div>
      <div><span class="lbl">Nodes</span><span id="stat-nodes">0</span></div>
      <div><span class="lbl">Edges</span><span id="stat-edges">0</span></div>
      <div><span class="lbl">Time</span><span id="stat-time">0.000</span></div>
      <div><span class="lbl">FPS</span><span id="stat-fps">0</span></div>
    </section>

    <section id="msg" class="row msg"></section>
  </aside>

  <button id="show-hud" title="Show panel" hidden>&#x2630;</button>

  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
