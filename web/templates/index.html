<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Camera Visualizer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="viz-shell">
    <nav id="viz-tabs" aria-label="Visualization mode">
      <button type="button" class="viz-tab active" data-view="graph">Graph 3D</button>
      <button type="button" class="viz-tab" data-view="video">Event video</button>
      <button type="button" class="viz-tab" data-view="st3d">Space-time 3D</button>
    </nav>
    <div id="viewport" class="viz-pane active" aria-label="3D graph view"></div>
    <div id="video-viewport" class="viz-pane" aria-label="Event video view">
      <div id="video-stage">
        <canvas id="video-canvas"></canvas>
        <p id="video-empty">Load an event file, set the time window, then press Run.</p>
      </div>
      <div id="video-control-bar" hidden>
        <label class="video-control-label">
          Time window <span id="vw-val" class="frame-bar-count">2%</span>
          <input type="range" id="vw" min="0.5" max="25" step="0.5" value="2" />
        </label>
        <div class="frame-bar-top">
          <span class="frame-bar-title">Playback</span>
          <span id="video-progress" class="frame-bar-count">0%</span>
        </div>
        <input type="range" id="video-scrub" min="0" max="1000" value="0" step="1" />
        <div id="video-time-range" class="frame-bar-range">—</div>
      </div>
    </div>
    <div id="st-viewport" class="viz-pane" aria-label="Space-time 3D video view">
      <div id="st-stage">
        <p id="st-empty">Load an event file, then press Run to grow the 3D space-time volume.</p>
      </div>
      <div id="st-control-bar" hidden>
        <label class="video-control-label">
          Time window <span id="st-vw-val" class="frame-bar-count">2%</span>
          <input type="range" id="st-vw" min="0.5" max="25" step="0.5" value="2" />
        </label>
        <div class="frame-bar-top">
          <span class="frame-bar-title">Playback</span>
          <span id="st-progress" class="frame-bar-count">0%</span>
        </div>
        <input type="range" id="st-scrub" min="0" max="1000" value="0" step="1" />
        <div id="st-time-range" class="frame-bar-range">—</div>
      </div>
    </div>
  </div>

  <aside id="hud">
    <header>
      <h1>Event Visualizer</h1>
      <button id="collapse" title="Collapse panel">&#x2715;</button>
    </header>

    <section class="row">
      <label for="file-select">Event file</label>
      <div class="file-row">
        <select id="file-select"></select>
        <button id="refresh" title="Reload list">&#x21bb;</button>
      </div>
      <input type="file" id="file-upload" accept=".mat,.bin,.dat,.txt,.h5,.hdf5" />
      <label for="file-upload" class="file-button">Upload .mat / .bin / .dat / .txt</label>
    </section>

    <section class="row">
      <label>
        Max neighbours <span id="k-val" class="num">8</span>
        <input type="range" id="k" min="1" max="32" step="1" value="8" />
      </label>

      <label>
        Max distance <span id="d-val" class="num">12</span>
        <input type="range" id="d" min="1" max="200" step="1" value="12" />
      </label>

      <label>
        Time scale (z) <span id="ts-val" class="num">1.00</span>
        <input type="range" id="ts" min="0.05" max="5" step="0.05" value="1" />
      </label>

      <label>
        Speed &times; <span id="sp-val" class="num">1.0</span>
        <input type="range" id="sp" min="0.05" max="20" step="0.05" value="1" />
      </label>
    </section>

    <section class="row buttons">
      <button id="run" class="primary">Run</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset">Reset</button>
      <button id="fullscreen" title="Toggle fullscreen">&#x26F6;</button>
    </section>

    <section class="row stats">
      <div><span class="lbl">Events</span><span id="stat-events">0 / 0</span></div>
      <div><span class="lbl">Nodes</span><span id="stat-nodes">0</span></div>
      <div><span class="lbl">Edges</span><span id="stat-edges">0</span></div>
      <div><span class="lbl">Time</span><span id="stat-time">0.000</span></div>
      <div><span class="lbl">FPS</span><span id="stat-fps">0</span></div>
    </section>

    <section id="msg" class="row msg"></section>
  </aside>

  <button id="show-hud" title="Show panel" hidden>&#x2630;</button>

  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
